<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>obts dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8fa;
        --surface: #ffffff;
        --raised: #f1f3f7;
        --border: #d8dee8;
        --text: #17202e;
        --muted: #5c667a;
        --primary: #4f5bd5;
        --success: #1f8f5a;
        --info: #2474d6;
        --warning: #b7791f;
        --danger: #c93c45;
        --neutral: #6b7280;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1117;
          --surface: #171a21;
          --raised: #202633;
          --border: #313847;
          --text: #e7eaf1;
          --muted: #a6aebe;
          --primary: #7a86ff;
          --success: #36b979;
          --info: #4a9dff;
          --warning: #d89b2b;
          --danger: #ef5b63;
          --neutral: #8792a2;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      button,
      input,
      select {
        font: inherit;
      }
      button {
        min-height: 32px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        padding: 5px 12px;
        cursor: pointer;
      }
      button.primary {
        border-color: var(--primary);
        background: var(--primary);
        color: #ffffff;
      }
      button.icon {
        width: 32px;
        padding: 0;
      }
      input,
      select {
        min-height: 32px;
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        padding: 5px 8px;
      }
      label {
        display: grid;
        gap: 4px;
        color: var(--muted);
        font-size: 13px;
      }
      .shell {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 240px minmax(0, 1fr);
      }
      aside {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        background: var(--surface);
        padding: 16px;
      }
      .vault-selector {
        min-height: 32px;
      }
      nav {
        display: grid;
        gap: 4px;
        margin-top: 24px;
      }
      nav button {
        justify-content: flex-start;
        width: 100%;
        border-color: transparent;
        background: transparent;
        text-align: left;
      }
      nav button.active {
        background: var(--raised);
      }
      .session-actions {
        margin-top: auto;
      }
      .content {
        min-width: 0;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        padding: 0 24px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 32px;
        font-weight: 600;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 16px;
        line-height: 24px;
        font-weight: 600;
      }
      main {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
        padding: 24px;
      }
      section,
      dialog {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
      }
      section {
        padding: 16px;
      }
      dialog {
        width: min(520px, calc(100vw - 32px));
        color: var(--text);
        padding: 0;
      }
      dialog::backdrop {
        background: rgb(15 17 23 / 55%);
      }
      .dialog-body,
      .dialog-footer {
        padding: 16px;
      }
      .dialog-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        border-top: 1px solid var(--border);
      }
      .summary {
        grid-column: span 3;
        min-height: 104px;
      }
      .wide {
        grid-column: span 8;
      }
      .side {
        grid-column: span 4;
      }
      .auth-panel {
        grid-column: 4 / span 6;
      }
      .stack {
        display: grid;
        gap: 12px;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .muted {
        color: var(--muted);
      }
      .metric {
        font-size: 24px;
        line-height: 32px;
        font-weight: 600;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 24px;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1px 8px;
        white-space: nowrap;
      }
      .badge.success {
        color: var(--success);
      }
      .badge.info {
        color: var(--info);
      }
      .badge.warning {
        color: var(--warning);
      }
      .badge.danger {
        color: var(--danger);
      }
      .badge.neutral {
        color: var(--neutral);
      }
      .error {
        color: var(--danger);
      }
      .hidden {
        display: none;
      }
      @media (max-width: 900px) {
        button,
        input,
        select {
          min-height: 40px;
        }
        button.icon {
          width: 40px;
        }
        .shell {
          grid-template-columns: 1fr;
        }
        aside {
          display: none;
        }
        header {
          padding: 0 16px;
        }
        main {
          grid-template-columns: 1fr;
          padding: 16px;
        }
        .summary,
        .wide,
        .side,
        .auth-panel {
          grid-column: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside>
        <select id="vaultSelect" class="vault-selector" aria-label="Current vault"></select>
        <nav aria-label="Primary">
          <button class="active" type="button">Overview</button>
          <button type="button">Devices</button>
          <button type="button">Conflicts <span id="conflictBadge" class="badge warning hidden">0</span></button>
          <button type="button" disabled>History</button>
          <button type="button">Maintenance</button>
          <button type="button">Settings</button>
        </nav>
        <div class="session-actions">
          <button id="logoutButton" type="button">Log out</button>
        </div>
      </aside>
      <div class="content">
        <header>
          <div>
            <h1 id="pageTitle">Overview</h1>
            <div id="pageSubtitle" class="muted">Checking session</div>
          </div>
          <div class="toolbar">
            <span id="refreshedAt" class="muted"></span>
            <button id="refreshButton" type="button">Refresh</button>
            <button id="pairButton" class="primary" type="button">Pair device</button>
          </div>
        </header>
        <main id="main"></main>
      </div>
    </div>

    <dialog id="pairDialog">
      <form id="pairForm" method="dialog">
        <div class="dialog-body stack">
          <h2>Pair Device</h2>
          <label>
            Device name
            <input name="device_name" autocomplete="off" required />
          </label>
          <label>
            Sync profile
            <select name="sync_profile">
              <option value="notes_only">Notes only</option>
              <option value="notes_plus_attachments">Notes plus attachments</option>
              <option value="full_vault_config">Full vault config</option>
            </select>
          </label>
          <label>
            <span><input name="sync_plugins" type="checkbox" /> Sync selected plugin files</span>
          </label>
          <div id="pairTokenResult" class="stack hidden"></div>
          <div id="pairError" class="error"></div>
        </div>
        <div class="dialog-footer">
          <button id="pairCancel" type="button">Close</button>
          <button class="primary" type="submit">Create token</button>
        </div>
      </form>
    </dialog>

    <script>
      const state = {
        csrfToken: null,
        vaults: [],
        currentVaultId: null,
        dashboard: null,
        events: [],
        health: null
      };

      const main = document.querySelector("#main");
      const vaultSelect = document.querySelector("#vaultSelect");
      const pairDialog = document.querySelector("#pairDialog");
      const pairForm = document.querySelector("#pairForm");

      document.querySelector("#refreshButton").addEventListener("click", () => loadApp());
      document.querySelector("#logoutButton").addEventListener("click", logout);
      document.querySelector("#pairButton").addEventListener("click", () => {
        document.querySelector("#pairError").textContent = "";
        document.querySelector("#pairTokenResult").classList.add("hidden");
        pairDialog.showModal();
      });
      document.querySelector("#pairCancel").addEventListener("click", () => pairDialog.close());
      vaultSelect.addEventListener("change", () => {
        state.currentVaultId = vaultSelect.value;
        loadDashboard();
      });
      pairForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await createPairingToken(new FormData(pairForm));
      });

      init();

      async function init() {
        try {
          const setup = await fetchJson("/api/v1/setup/status");
          if (!setup.setup_complete) {
            renderSetup();
            return;
          }
          await loadApp();
        } catch (error) {
          renderError(error.message);
        }
      }

      async function loadApp() {
        try {
          const session = await fetchJson("/api/v1/auth/session");
          state.csrfToken = session.csrf_token;
          const vaults = await api("/vaults");
          state.vaults = vaults.vaults;
          state.currentVaultId = state.currentVaultId ?? state.vaults[0]?.vault_id ?? null;
          if (!state.currentVaultId) {
            renderCreateVault();
            return;
          }
          await loadDashboard();
        } catch (error) {
          if (error.status === 401) {
            renderLogin();
            return;
          }
          renderError(error.message);
        }
      }

      async function loadDashboard() {
        try {
          syncVaultSelect();
          const [dashboard, events, health] = await Promise.all([
            api(`/vaults/${state.currentVaultId}/dashboard`),
            api(`/vaults/${state.currentVaultId}/events?after=0`),
            fetchJson("/health/ready").catch((error) => ({ status: "not_ready", detail: error.message }))
          ]);
          state.dashboard = dashboard;
          state.events = events.events;
          state.health = health;
          renderOverview();
        } catch (error) {
          renderError(error.message);
        }
      }

      function renderSetup() {
        setHeader("Setup", "Create the first administrator", false);
        main.innerHTML = formPanel("setupForm", "Initial Admin", [
          inputField("username", "Username", "admin", "text"),
          inputField("display_name", "Display name", "Admin", "text"),
          inputField("password", "Password", "", "password")
        ]);
        document.querySelector("#setupForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          const body = formBody(new FormData(event.target));
          const result = await fetchJson("/api/v1/setup", { method: "POST", body });
          state.csrfToken = result.csrf_token;
          await loadApp();
        });
      }

      function renderLogin() {
        setHeader("Login", "Dashboard session required", false);
        main.innerHTML = formPanel("loginForm", "Sign In", [
          inputField("username", "Username", "admin", "text"),
          inputField("password", "Password", "", "password")
        ]);
        document.querySelector("#loginForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          const result = await fetchJson("/api/v1/auth/login", { method: "POST", body: formBody(new FormData(event.target)) });
          state.csrfToken = result.csrf_token;
          await loadApp();
        });
      }

      function renderCreateVault() {
        setHeader("Overview", "No vault selected", false);
        main.innerHTML = formPanel("vaultForm", "Create Vault", [inputField("display_name", "Vault name", "Main Vault", "text")]);
        document.querySelector("#vaultForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          const vault = await api("/vaults", { method: "POST", body: formBody(new FormData(event.target)) });
          state.currentVaultId = vault.vault_id;
          await loadApp();
        });
      }

      function renderOverview() {
        const dashboard = state.dashboard;
        const conflictCount = dashboard.unresolved_conflict_count;
        document.querySelector("#conflictBadge").textContent = String(conflictCount);
        document.querySelector("#conflictBadge").classList.toggle("hidden", conflictCount === 0);
        setHeader("Overview", `${dashboard.vault.display_name} - ${dashboard.vault.status}`, true);
        document.querySelector("#refreshedAt").textContent = `Updated ${new Date().toLocaleTimeString()}`;
        main.innerHTML = `
          ${summary("Sync status", statusBadge(topStatus(dashboard)), dashboard.vault.current_main)}
          ${summary("Unresolved conflicts", `<span class="metric">${conflictCount}</span>`, conflictCount === 0 ? "No open reviews" : "Review needed")}
          ${summary("Paired devices", `<span class="metric">${dashboard.devices.length}</span>`, `${blockedDevices(dashboard).length} blocked`)}
          ${summary("Readiness", statusBadge(healthStatus()), state.health.git_version ?? state.health.detail ?? "")}
          <section class="wide">
            <h2>Devices</h2>
            ${deviceTable(dashboard.devices)}
          </section>
          <section class="side">
            <h2>Attention</h2>
            ${attentionList(dashboard)}
          </section>
          <section class="wide">
            <h2>Recent Activity</h2>
            ${eventList(state.events)}
          </section>
          <section class="side">
            <h2>Maintenance</h2>
            ${maintenanceList()}
          </section>
        `;
      }

      async function createPairingToken(formData) {
        try {
          const result = await api(`/vaults/${state.currentVaultId}/pairing-tokens`, {
            method: "POST",
            body: {
              device_name: formData.get("device_name"),
              sync_profile: formData.get("sync_profile"),
              sync_plugins: formData.get("sync_plugins") === "on"
            }
          });
          const target = document.querySelector("#pairTokenResult");
          target.classList.remove("hidden");
          target.innerHTML = `
            <label>
              Pairing token
              <span class="toolbar"><code>${escapeHtml(result.pairing_token)}</code><button type="button" data-copy="${escapeHtml(result.pairing_token)}">Copy</button></span>
            </label>
            <label>
              Pairing URL
              <span class="toolbar"><code>${escapeHtml(result.pairing_url)}</code><button type="button" data-copy="${escapeHtml(result.pairing_url)}">Copy</button></span>
            </label>
            <div class="muted">Expires ${new Date(result.expires_at).toLocaleTimeString()}</div>
          `;
          target.querySelectorAll("[data-copy]").forEach((button) => {
            button.addEventListener("click", () => navigator.clipboard?.writeText(button.dataset.copy));
          });
        } catch (error) {
          document.querySelector("#pairError").textContent = error.message;
          if (error.code === "recent_auth_required") {
            renderLogin();
            pairDialog.close();
          }
        }
      }

      async function logout() {
        await api("/auth/logout", { method: "POST", body: {} }).catch(() => undefined);
        state.csrfToken = null;
        renderLogin();
      }

      async function api(path, options = {}) {
        const headers = { "content-type": "application/json" };
        if (state.csrfToken && options.method && options.method !== "GET") {
          headers["x-obts-csrf"] = state.csrfToken;
        }
        return fetchJson(`/api/v1${path}`, { ...options, headers: { ...headers, ...(options.headers ?? {}) } });
      }

      async function fetchJson(path, options = {}) {
        const response = await fetch(path, {
          credentials: "same-origin",
          ...options,
          body: options.body === undefined ? undefined : JSON.stringify(options.body)
        });
        const json = await response.json().catch(() => ({}));
        if (!response.ok) {
          const error = new Error(json.error?.message ?? `HTTP ${response.status}`);
          error.status = response.status;
          error.code = json.error?.code;
          throw error;
        }
        return json;
      }

      function syncVaultSelect() {
        vaultSelect.innerHTML = state.vaults
          .map((vault) => `<option value="${escapeHtml(vault.vault_id)}">${escapeHtml(vault.display_name)}</option>`)
          .join("");
        vaultSelect.value = state.currentVaultId;
      }

      function setHeader(title, subtitle, appReady) {
        document.querySelector("#pageTitle").textContent = title;
        document.querySelector("#pageSubtitle").textContent = subtitle;
        document.querySelector("#pairButton").disabled = !appReady;
        vaultSelect.disabled = !appReady;
      }

      function formPanel(id, title, fields) {
        return `<section class="auth-panel"><form id="${id}" class="stack"><h2>${title}</h2>${fields.join("")}<button class="primary" type="submit">Continue</button></form></section>`;
      }

      function inputField(name, label, value, type) {
        return `<label>${label}<input name="${name}" type="${type}" value="${escapeHtml(value)}" required /></label>`;
      }

      function formBody(formData) {
        return Object.fromEntries([...formData.entries()].filter(([, value]) => value !== ""));
      }

      function summary(title, body, detail) {
        return `<section class="summary"><h2>${title}</h2><div>${body}</div><div class="muted"><code>${escapeHtml(shortId(detail))}</code></div></section>`;
      }

      function deviceTable(devices) {
        if (devices.length === 0) {
          return `<div class="muted">No devices paired</div>`;
        }
        return `<table><thead><tr><th>Device</th><th>Status</th><th>Ahead/behind</th><th>Profile</th><th>Last seen</th></tr></thead><tbody>${devices
          .map(
            (device) => `<tr>
              <td>${escapeHtml(device.device_name)}</td>
              <td>${statusBadge(device.status_label)}</td>
              <td>${device.ahead_of_main ? "Ahead" : device.behind_main ? "Behind" : "Current"}</td>
              <td>${escapeHtml(device.sync_profile)}</td>
              <td>${device.last_seen_at ? new Date(device.last_seen_at).toLocaleString() : "Never"}</td>
            </tr>`
          )
          .join("")}</tbody></table>`;
      }

      function attentionList(dashboard) {
        const items = [];
        for (const device of dashboard.devices) {
          if (device.blocked || device.offline || device.behind_main) {
            items.push(`${escapeHtml(device.device_name)} - ${escapeHtml(device.status_label)}`);
          }
        }
        if (dashboard.unresolved_conflict_count > 0) {
          items.unshift(`${dashboard.unresolved_conflict_count} conflict${dashboard.unresolved_conflict_count === 1 ? "" : "s"} open`);
        }
        return items.length ? `<ul>${items.map((item) => `<li>${item}</li>`).join("")}</ul>` : `<div class="muted">No attention items</div>`;
      }

      function eventList(events) {
        if (events.length === 0) {
          return `<div class="muted">No events</div>`;
        }
        return `<table><thead><tr><th>Seq</th><th>Type</th><th>Commit</th><th>Created</th></tr></thead><tbody>${events
          .slice(-8)
          .reverse()
          .map(
            (event) => `<tr>
              <td>${event.event_seq}</td>
              <td>${escapeHtml(event.event_type)}</td>
              <td><code>${escapeHtml(shortId(event.commit_cursors.main ?? event.commit_cursors.device_commit ?? ""))}</code></td>
              <td>${new Date(event.created_at).toLocaleString()}</td>
            </tr>`
          )
          .join("")}</tbody></table>`;
      }

      function maintenanceList() {
        const ready = state.health.status === "ready";
        return `<div class="stack">
          <div>${statusBadge(ready ? "Synced" : "Integrity failure")} Persistent state</div>
          <div>${statusBadge(ready ? "Synced" : "Blocked")} Server Git store</div>
          <div>${statusBadge(ready ? "Synced" : "Blocked")} Native git</div>
        </div>`;
      }

      function topStatus(dashboard) {
        if (dashboard.vault.status === "blocked_integrity") return "Integrity failure";
        if (dashboard.unresolved_conflict_count > 0) return "Review needed";
        if (blockedDevices(dashboard).length > 0) return "Needs recovery";
        if (dashboard.devices.some((device) => device.offline)) return "Offline";
        if (dashboard.devices.some((device) => device.behind_main)) return "Behind";
        if (dashboard.devices.some((device) => device.ahead_of_main)) return "Ahead";
        return "Synced";
      }

      function healthStatus() {
        return state.health.status === "ready" ? "Synced" : "Integrity failure";
      }

      function blockedDevices(dashboard) {
        return dashboard.devices.filter((device) => device.blocked);
      }

      function statusBadge(label) {
        const role =
          label === "Synced"
            ? "success"
            : label === "Uploading" || label === "Applying" || label === "Checking" || label === "Merging"
              ? "info"
              : label === "Review needed" || label === "Behind" || label === "Ahead" || label === "Offline"
                ? "warning"
                : label === "Blocked" || label === "Needs recovery" || label === "Unsafe local state" || label === "Integrity failure"
                  ? "danger"
                  : "neutral";
        return `<span class="badge ${role}"><span aria-hidden="true">●</span>${escapeHtml(label)}</span>`;
      }

      function renderError(message) {
        setHeader("Overview", "Action required", false);
        main.innerHTML = `<section class="auth-panel"><h2>Error</h2><div class="error">${escapeHtml(message)}</div></section>`;
      }

      function shortId(value) {
        if (!value) return "";
        return value.length > 16 ? `${value.slice(0, 12)}...` : value;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }
    </script>
  </body>
</html>
