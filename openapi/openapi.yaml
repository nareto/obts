          type: string
          pattern: "^vlt_"
        device_id:
          type: string
          pattern: "^dev_"
        status:
          type: string
          enum: [open, resolved]
        base_commit:
          type: string
          pattern: "^[0-9a-f]{40}$"
        current_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        device_commit:
          type: string
          pattern: "^[0-9a-f]{40}$"
        expected_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        affected_paths:
          type: array
          items:
            type: string
        affected_path_count:
          type: integer
          minimum: 0
        merge_sequence:
          type: integer
          minimum: 1
        merge_policy_version:
          type: string
        conflict_kind:
          enum: [content, directory, mixed]
