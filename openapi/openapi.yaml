openapi: 3.1.0
info:
  title: Obsidian True Sync Phase 1 API
  version: 0.1.0
  summary: Sync without conflict resolution.
servers:
  - url: /api/v1
security:
  - dashboardSession: []
  - dashboardSessionHttps: []
paths:
  /setup/status:
    get:
      summary: Return whether first-run setup is complete.
      security: []
      responses:
        "200":
          description: Setup status.
  /setup:
    post:
      summary: Create the initial admin account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "201":
          description: Initial admin session.
        "409":
          $ref: "#/components/responses/Error"
  /auth/login:
    post:
      summary: Create a dashboard session and CSRF token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Dashboard session.
        "401":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /auth/session:
    get:
      summary: Return the current dashboard session and CSRF token.
      responses:
        "200":
          description: Dashboard session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Error"
  /auth/logout:
    post:
      summary: Revoke the current dashboard session.
      security: []
      responses:
        "200":
          description: Session revoked or already absent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /auth/password-reset:
    post:
      summary: Consume a one-time password reset token and set a new password.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Password reset completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Error"
  /admin/users:
    get:
      summary: List account metadata visible to admins.
      responses:
        "200":
          description: Redacted account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "403":
          $ref: "#/components/responses/Error"
    post:
      summary: Create a user account as an admin.
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
      responses:
        "201":
          description: Created user metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "403":
          $ref: "#/components/responses/Error"
  /admin/users/{user_id}/disable:
    post:
      summary: Disable a user and immediately revoke that user's sessions and tokens.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Updated account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "409":
          $ref: "#/components/responses/Error"
  /admin/users/{user_id}/enable:
    post:
      summary: Re-enable a disabled user account.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Updated account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
  /admin/users/{user_id}/grant-admin:
    post:
      summary: Grant admin status to a user account.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Updated account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
  /admin/users/{user_id}/revoke-admin:
    post:
      summary: Revoke admin status unless that would remove the final enabled admin.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Updated account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "409":
          $ref: "#/components/responses/Error"
  /admin/users/{user_id}/password-reset-tokens:
    post:
      summary: Create a one-time password reset token for a user.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "201":
          description: One-time password reset token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetTokenResponse"
  /vaults:
    get:
      summary: List vaults owned by the authenticated user.
      responses:
        "200":
          description: Owned vaults.
    post:
      summary: Create a vault and initialize server main to an empty-tree root commit.
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVaultRequest"
      responses:
        "201":
          description: Vault metadata.
  /vaults/{vault_id}/main:
    get:
      summary: Return current server main for an owned vault.
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Current main.
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/dashboard:
    get:
      summary: Return minimal Phase 1 dashboard state.
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Device, conflict, and health summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/pairing-tokens:
    post:
      summary: Create a one-time pairing token after recent dashboard auth.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePairingTokenRequest"
      responses:
        "201":
          description: One-time pairing token and URL.
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/devices/{device_id}/revoke:
    post:
      summary: Revoke a paired device and its device tokens after recent dashboard auth.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/DeviceId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Device revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /pair/consume:
    post:
      summary: Consume a one-time pairing token and register a device.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumePairingTokenRequest"
      responses:
        "201":
          description: Device token and initial server main.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumePairingTokenResponse"
        "401":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/push:
    post:
      summary: Upload a device commit pack and request a protected device-ref update.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [manifest, packfile]
              properties:
                manifest:
                  $ref: "#/components/schemas/DevicePushManifest"
                packfile:
                  type: string
                  contentEncoding: binary
      responses:
        "200":
          description: Push result.
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/pull:
    post:
      summary: Pull Git objects needed to reach current server main.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [manifest, packfile]
              properties:
                manifest:
                  $ref: "#/components/schemas/DevicePullRequest"
                packfile:
                  type: string
                  contentEncoding: binary
      responses:
        "200":
          description: Multipart manifest and packfile.
          content:
            multipart/form-data:
              schema:
                type: object
                properties:
                  manifest:
                    $ref: "#/components/schemas/DevicePullManifest"
                  packfile:
                    type: string
                    contentEncoding: binary
        "409":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/events:
    get:
      summary: Poll redacted vault events using a paired device token.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: after
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Redacted device-visible event page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPage"
        "404":
          $ref: "#/components/responses/Error"
        "410":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/unpair:
    post:
      summary: Revoke the current paired device and invalidate its device token.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Device unpaired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/conflicts:
    get:
      summary: List durable conflict records for an owned vault.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: status
          in: query
          schema:
            type: string
            enum: [open, resolved]
      responses:
        "200":
          description: Conflict records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictListResponse"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/events:
    get:
      summary: Poll redacted vault-scoped events after a cursor.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: after
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Event page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPage"
        "410":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    dashboardSession:
      type: apiKey
      in: cookie
      name: obts_session
      description: Default HTTP/dev dashboard session cookie.
    dashboardSessionHttps:
      type: apiKey
      in: cookie
      name: __Host-obts_session
      description: Secure dashboard session cookie used when the public base URL is HTTPS.
    deviceBearer:
      type: http
      scheme: bearer
  parameters:
    VaultId:
      name: vault_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^vlt_"
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^usr_"
    DeviceId:
      name: device_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^dev_"
    CsrfHeader:
      name: X-OBTS-CSRF
      in: header
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Redacted JSON error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    SetupRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 12
        display_name:
          type: string
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      required: [user_id, csrf_token, recent_auth_expires_at]
      properties:
        user_id:
          type: string
        csrf_token:
          type: string
        recent_auth_expires_at:
          type: string
          format: date-time
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    PasswordResetRequest:
      type: object
      required: [reset_token, new_password]
      properties:
        reset_token:
          type: string
        new_password:
          type: string
          minLength: 12
    AdminCreateUserRequest:
      allOf:
        - $ref: "#/components/schemas/SetupRequest"
        - type: object
          properties:
            is_admin:
              type: boolean
    AdminUserListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserSummary"
    AdminUserSummary:
      type: object
      required:
        - user_id
        - username
        - display_name
        - is_admin
        - disabled
        - created_at
        - last_login_at
        - owned_vault_count
      properties:
        user_id:
          type: string
          pattern: "^usr_"
        username:
          type: string
        display_name:
          type: string
        is_admin:
          type: boolean
        disabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_login_at:
          oneOf:
            - type: "null"
            - type: string
              format: date-time
        owned_vault_count:
          type: integer
          minimum: 0
    PasswordResetTokenResponse:
      type: object
      required: [reset_token, expires_at]
      properties:
        reset_token:
          type: string
        expires_at:
          type: string
          format: date-time
    CreateVaultRequest:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
    CreatePairingTokenRequest:
      type: object
      required: [device_name]
      properties:
        device_name:
          type: string
    ConsumePairingTokenRequest:
      allOf:
        - $ref: "#/components/schemas/CreatePairingTokenRequest"
        - type: object
          required: [pairing_token]
          properties:
            pairing_token:
              type: string
    ConsumePairingTokenResponse:
      type: object
      required:
        - user_id
        - vault_id
        - device_id
        - device_token
        - device_ref
        - current_main
        - is_first_device
      properties:
        user_id:
          type: string
        vault_id:
          type: string
        device_id:
          type: string
        device_token:
          type: string
        device_ref:
          type: string
        current_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        is_first_device:
          type: boolean
    DevicePushManifest:
      type: object
      required:
        - api_version
        - vault_id
        - device_id
        - expected_device_ref
        - target_commit
        - packfile_sha256
        - packfile_bytes
        - client_known_main
      properties:
        api_version:
          const: 2026-07-02.full-sync
        vault_id:
          type: string
        device_id:
          type: string
        expected_device_ref:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
        target_commit:
          type: string
          pattern: "^[0-9a-f]{40}$"
        packfile_sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        packfile_bytes:
          type: integer
          minimum: 0
        client_known_main:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
        attempt_id:
          type: string
    DevicePullRequest:
      type: object
      required: [api_version, vault_id, device_id, current_local_main, requested_target]
      properties:
        api_version:
          const: 2026-07-02.full-sync
        vault_id:
          type: string
        device_id:
          type: string
        current_local_main:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
        requested_target:
          oneOf:
            - const: latest
            - type: string
              pattern: "^[0-9a-f]{40}$"
    DevicePullManifest:
      type: object
      required: [api_version, vault_id, device_id, target_main, changed_paths, current_local_main_is_ancestor, event_seq]
      properties:
        api_version:
          const: 2026-07-02.full-sync
        vault_id:
          type: string
        device_id:
          type: string
        target_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        changed_paths:
          type: array
          items:
            type: string
        current_local_main_is_ancestor:
          oneOf:
            - type: "null"
            - type: boolean
        event_seq:
          type: integer
    EventPage:
      type: object
      required: [events, current_event_seq]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/EventEnvelope"
        current_event_seq:
          type: integer
          minimum: 0
    EventEnvelope:
      type: object
      required:
        - event_id
        - event_seq
        - event_type
        - vault_id
        - resource_ids
        - commit_cursors
        - payload
        - created_at
      properties:
        event_id:
          type: string
          pattern: "^evt_"
        event_seq:
          type: integer
          minimum: 1
        event_type:
          type: string
          enum:
            - main_advanced
            - device_ref_updated
            - device_sync_rejected
            - device_recovery_required
            - conflict_created
            - conflict_resolved
            - device_state_changed
        vault_id:
          type: string
          pattern: "^vlt_"
        resource_ids:
          type: object
          additionalProperties:
            type: string
        commit_cursors:
          type: object
          additionalProperties:
            oneOf:
              - type: "null"
              - type: string
        payload:
          type: object
        created_at:
          type: string
          format: date-time
    DashboardSummary:
      type: object
      required: [vault, devices, unresolved_conflict_count, health]
      properties:
        vault:
          type: object
          required: [vault_id, display_name, current_main, status]
          properties:
            vault_id:
              type: string
            display_name:
              type: string
            current_main:
              type: string
              pattern: "^[0-9a-f]{40}$"
            status:
              type: string
              enum: [active, blocked_integrity]
        devices:
          type: array
          items:
            type: object
            required:
              - device_id
              - device_name
              - status
              - status_label
              - last_seen_at
              - device_ref_head
              - last_applied_main
              - last_successful_sync_at
              - ahead_of_main
              - behind_main
              - blocked
              - offline
            properties:
              device_id:
                type: string
              device_name:
                type: string
              status:
                type: string
                enum: [paired, synced, ahead, review_needed, blocked_recovery, revoked]
              status_label:
                type: string
              last_seen_at:
                oneOf:
                  - type: "null"
                  - type: string
                    format: date-time
              device_ref_head:
                oneOf:
                  - type: "null"
                  - type: string
                    pattern: "^[0-9a-f]{40}$"
              last_applied_main:
                oneOf:
                  - type: "null"
                  - type: string
                    pattern: "^[0-9a-f]{40}$"
              last_successful_sync_at:
                oneOf:
                  - type: "null"
                  - type: string
                    format: date-time
              ahead_of_main:
                type: boolean
              behind_main:
                type: boolean
              blocked:
                type: boolean
              offline:
                type: boolean
        unresolved_conflict_count:
          type: integer
          minimum: 0
        health:
          $ref: "#/components/schemas/ReadinessSummary"
    ConflictListResponse:
      type: object
      required: [conflicts]
      properties:
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/ConflictRecord"
    ConflictRecord:
      type: object
      required:
        - conflict_id
        - vault_id
        - device_id
        - status
        - base_commit
        - current_main
        - device_commit
        - expected_main
        - affected_paths
        - affected_path_count
        - merge_sequence
        - merge_policy_version
        - validator_results
        - validator_summary
        - created_at
      properties:
        conflict_id:
          type: string
          pattern: "^conf_"
        vault_id:
          type: string
          pattern: "^vlt_"
        device_id:
          type: string
          pattern: "^dev_"
        status:
          type: string
          enum: [open, resolved]
        base_commit:
          type: string
          pattern: "^[0-9a-f]{40}$"
        current_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        device_commit:
          type: string
          pattern: "^[0-9a-f]{40}$"
        expected_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        affected_paths:
          type: array
          items:
            type: string
        affected_path_count:
          type: integer
          minimum: 0
        merge_sequence:
          type: integer
          minimum: 1
        merge_policy_version:
          type: string
        validator_results:
          type: object
        validator_summary:
          type: object
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
    ReadinessSummary:
      type: object
      required: [status, checks, detail, git_version]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          required:
            - metadata
            - metadata_store
            - git
            - setup_complete
            - migrations
            - git_store
            - temp_workspace
            - persistent_state
          properties:
            metadata:
              type: boolean
            metadata_store:
              type: boolean
            git:
              type: boolean
            setup_complete:
              type: boolean
            migrations:
              type: boolean
            git_store:
              type: boolean
            temp_workspace:
              type: boolean
            persistent_state:
              type: boolean
        detail:
          oneOf:
            - type: "null"
            - type: string
        git_version:
          type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
            details:
              type: object
