    ConflictRecord:
      type: object
      required:
        - conflict_id
        - vault_id
        - device_id
        - status
        - base_commit
        - current_main
        - device_commit
        - expected_main
        - affected_paths
        - affected_path_count
        - merge_sequence
        - merge_policy_version
        - conflict_kind
        - validator_results
        - validator_summary
        - created_at
      properties:
        conflict_id:
          type: string
          pattern: "^conf_"
