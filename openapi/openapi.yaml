                oneOf:
                  - type: "null"
                  - type: string
              local_error_code:
                oneOf:
                  - type: "null"
                  - type: string
              local_queue_status:
                oneOf:
                  - type: "null"
                  - type: string
              local_main:
                oneOf:
                  - type: "null"
                  - type: string
                    pattern: "^[0-9a-f]{40}$"
              local_head:
                oneOf:
                  - type: "null"
                  - type: string
                    pattern: "^[0-9a-f]{40}$"
              plugin_version:
