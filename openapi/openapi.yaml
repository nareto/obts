openapi: 3.1.0
info:
  title: Obsidian True Sync Phase 3 API
  version: 0.3.9
  summary: Deployable note history, restore, diagnostics, and maintenance.
servers:
  - url: /api/v1
security:
  - dashboardSession: []
  - dashboardSessionHttps: []
paths:
  /setup/status:
    get:
      summary: Return whether first-run setup is complete.
      security: []
      responses:
        "200":
          description: Setup status.
  /setup:
    post:
      summary: Create the initial admin account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "201":
          description: Initial admin session.
        "409":
          $ref: "#/components/responses/Error"
  /auth/login:
    post:
      summary: Create a dashboard session and CSRF token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Dashboard session.
        "401":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /auth/reauthenticate:
    post:
      summary: Refresh recent authentication on the current dashboard session.
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Current dashboard session with refreshed recent-auth expiry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /auth/session:
    get:
      summary: Return the current dashboard session and CSRF token.
      responses:
        "200":
          description: Dashboard session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Error"
  /auth/logout:
    post:
      summary: Revoke the current dashboard session.
      security: []
      responses:
        "200":
          description: Session revoked or already absent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /auth/password-reset:
    post:
      summary: Consume a one-time password reset token and set a new password.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Password reset completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Error"
  /admin/users:
    get:
      summary: List account metadata visible to admins.
      responses:
        "200":
          description: Redacted account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "403":
          $ref: "#/components/responses/Error"
    post:
      summary: Create a user account as an admin.
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
      responses:
        "201":
          description: Created user metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "403":
          $ref: "#/components/responses/Error"
  /admin/users/{user_id}/disable:
    post:
      summary: Disable a user and immediately revoke that user's sessions and tokens.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Updated account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "409":
          $ref: "#/components/responses/Error"
  /admin/users/{user_id}/enable:
    post:
      summary: Re-enable a disabled user account.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Updated account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
  /admin/users/{user_id}/grant-admin:
    post:
      summary: Grant admin status to a user account.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Updated account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
  /admin/users/{user_id}/revoke-admin:
    post:
      summary: Revoke admin status unless that would remove the final enabled admin.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Updated account metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummary"
        "409":
          $ref: "#/components/responses/Error"
  /admin/users/{user_id}/password-reset-tokens:
    post:
      summary: Create a one-time password reset token for a user.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "201":
          description: One-time password reset token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetTokenResponse"
  /vaults:
    get:
      summary: List vaults owned by the authenticated user.
      responses:
        "200":
          description: Owned vaults.
    post:
      summary: Create a vault and initialize server main to an empty-tree root commit.
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVaultRequest"
      responses:
        "201":
          description: Vault metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultSummary"
        "400":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}:
    patch:
      summary: Rename an owned vault's server display metadata without renaming any device folder.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultNameRequest"
      responses:
        "200":
          description: Renamed vault metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultSummary"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/main:
    get:
      summary: Return current server main for an owned vault.
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Current main.
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/dashboard:
    get:
      summary: Return deployable dashboard state for devices, conflicts, activity, and health.
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Device, conflict, and health summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "404":
          $ref: "#/components/responses/Error"
  /connections:
    post:
      summary: Start browser-assisted plugin onboarding.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectionRequest"
      responses:
        "201":
          description: Pending connection authorization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionResponse"
        "400":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /connections/{connection_id}:
    get:
      summary: Poll a pending browser-assisted connection.
      security:
        - connectionBearer: []
      parameters:
        - $ref: "#/components/parameters/ConnectionId"
      responses:
        "200":
          description: Current connection status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionStatusResponse"
        "401":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /connections/{connection_id}/review:
    get:
      summary: Review a pending connection in an authenticated browser session.
      parameters:
        - $ref: "#/components/parameters/ConnectionId"
      responses:
        "200":
          description: Pending device metadata and owned vault choices.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionReviewResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /connections/{connection_id}/approve:
    post:
      summary: Approve a connection for a new or existing owned vault after recent authentication.
      parameters:
        - $ref: "#/components/parameters/ConnectionId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveConnectionRequest"
      responses:
        "200":
          description: Connection approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /connections/{connection_id}/deny:
    post:
      summary: Deny a pending connection.
      parameters:
        - $ref: "#/components/parameters/ConnectionId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Connection denied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /connections/{connection_id}/bootstrap:
    post:
      summary: Fetch approved existing-vault Git state before device registration.
      security:
        - connectionBearer: []
      parameters:
        - $ref: "#/components/parameters/ConnectionId"
      responses:
        "200":
          description: Bootstrap manifest and Git packfile.
          content:
            multipart/form-data:
              schema:
                type: object
                required: [manifest, packfile]
                properties:
                  manifest:
                    $ref: "#/components/schemas/ConnectionBootstrapManifest"
                  packfile:
                    type: string
                    contentEncoding: binary
        "401":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /connections/{connection_id}/bootstrap-chunk:
    post:
      summary: Fetch one bounded Git-object bootstrap chunk for an approved connection.
      security:
        - connectionBearer: []
      parameters:
        - $ref: "#/components/parameters/ConnectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChunkBootstrapRequest"
      responses:
        "200":
          description: Pinned bootstrap metadata and one independently importable Git pack chunk.
          content:
            multipart/form-data:
              schema:
                type: object
                required: [manifest, packfile]
                properties:
                  manifest:
                    $ref: "#/components/schemas/ChunkBootstrapManifest"
                  packfile:
                    type: string
                    contentEncoding: binary
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
  /connections/{connection_id}/diagnostic-events:
    post:
      summary: Accept one opted-in sanitized failure report from an approved onboarding connection.
      security:
        - connectionBearer: []
      parameters:
        - $ref: "#/components/parameters/ConnectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosticEvent"
      responses:
        "202":
          description: Diagnostic event accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticIngestResponse"
        "200":
          description: Duplicate diagnostic event acknowledged.
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /connections/{connection_id}/complete:
    post:
      summary: Register the approved device with an explicit onboarding content mode.
      security:
        - connectionBearer: []
      parameters:
        - $ref: "#/components/parameters/ConnectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteConnectionRequest"
      responses:
        "201":
          description: Idempotent device registration and derived device credential metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteConnectionResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/devices/{device_id}:
    patch:
      summary: Rename a device belonging to an owned vault.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/DeviceId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceNameRequest"
      responses:
        "200":
          description: Renamed device metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceNameResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/devices/{device_id}/revoke:
    post:
      summary: Revoke a paired device and its device tokens after recent dashboard auth.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/DeviceId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Device revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /diagnostic-events:
    get:
      summary: List sanitized diagnostic events owned by the current dashboard user.
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Owner-scoped diagnostic event page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticEventsResponse"
        "401":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete all diagnostic events owned by the current dashboard user after recent authentication.
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Owner diagnostic events deleted.
        "403":
          $ref: "#/components/responses/Error"
  /device/self:
    get:
      summary: Return non-secret identity and ref metadata for the current device token.
      security:
        - deviceBearer: []
      responses:
        "200":
          description: Current paired device metadata for metadata repair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceSelfResponse"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      summary: Rename the current paired device using its bearer credential.
      security:
        - deviceBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceNameRequest"
      responses:
        "200":
          description: Renamed current-device metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceNameResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /device/diagnostic-events:
    post:
      summary: Accept one opted-in sanitized failure report from a paired device.
      security:
        - deviceBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosticEvent"
      responses:
        "202":
          description: Diagnostic event accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticIngestResponse"
        "200":
          description: Duplicate diagnostic event acknowledged.
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /sync/capabilities:
    get:
      summary: Discover bounded resumable Git transfer limits.
      security: []
      responses:
        "200":
          description: Transfer capabilities and hard limits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncCapabilities"
  /vaults/{vault_id}/sync/push-transfers:
    post:
      summary: Create or resume an idempotent bounded Git object-pack transfer.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChunkPushCreateRequest"
      responses:
        "200":
          description: Existing idempotent transfer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkPushDescriptor"
        "201":
          description: Transfer created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkPushDescriptor"
        "409":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/push-transfers/{transfer_id}:
    get:
      summary: Inspect resumable transfer receipts and terminal result.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: Transfer descriptor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkPushDescriptor"
        "404":
          $ref: "#/components/responses/Error"
        "410":
          $ref: "#/components/responses/Error"
    delete:
      summary: Abort and delete a resumable transfer owned by this device.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/TransferId"
      responses:
        "204":
          description: Transfer deleted.
  /vaults/{vault_id}/sync/push-transfers/{transfer_id}/chunks/{chunk_index}:
    put:
      summary: Upload one independently valid bounded Git pack chunk.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/TransferId"
        - name: chunk_index
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
        - name: X-Obts-Chunk-Sha256
          in: header
          required: true
          schema:
            type: string
            pattern: "^[0-9a-f]{64}$"
      requestBody:
        required: true
        content:
          application/x-git-packed-objects:
            schema:
              type: string
              contentEncoding: binary
      responses:
        "200":
          description: Idempotent chunk receipt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkPushReceipt"
        "409":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/push-transfers/{transfer_id}/finalize:
    post:
      summary: Validate the complete quarantined object set and atomically apply the device ref update.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/TransferId"
      responses:
        "200":
          description: Existing push result contract.
        "409":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/push:
    post:
      summary: Upload a device commit pack and request a protected device-ref update.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [manifest, packfile]
              properties:
                manifest:
                  $ref: "#/components/schemas/DevicePushManifest"
                packfile:
                  type: string
                  contentEncoding: binary
            encoding:
              manifest:
                contentType: application/json
      responses:
        "200":
          description: Push result.
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/pull:
    post:
      summary: Pull Git objects needed to reach current server main.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [manifest, packfile]
              properties:
                manifest:
                  $ref: "#/components/schemas/DevicePullRequest"
                packfile:
                  type: string
                  contentEncoding: binary
            encoding:
              manifest:
                contentType: application/json
      responses:
        "200":
          description: Multipart manifest and packfile.
          content:
            multipart/form-data:
              schema:
                type: object
                properties:
                  manifest:
                    $ref: "#/components/schemas/DevicePullManifest"
                  packfile:
                    type: string
                    contentEncoding: binary
        "409":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/pull-chunk:
    post:
      summary: Pull one bounded independently importable Git object-pack chunk for a pinned target.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChunkPullRequest"
      responses:
        "200":
          description: Chunk manifest and bounded Git pack.
          content:
            multipart/form-data:
              schema:
                type: object
                required: [manifest, packfile]
                properties:
                  manifest:
                    $ref: "#/components/schemas/ChunkPullManifest"
                  packfile:
                    type: string
                    contentEncoding: binary
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/device-status:
    post:
      summary: Report current local plugin status for dashboard diagnostics.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceStatusReport"
      responses:
        "200":
          description: Device status recorded with plugin compatibility guidance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceStatusResponse"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/events:
    get:
      summary: Poll redacted vault events using a paired device token.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: after
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Redacted device-visible event page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPage"
        "404":
          $ref: "#/components/responses/Error"
        "410":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/applied:
    post:
      summary: Acknowledge that a paired device durably completed applying a main commit.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [applied_main]
              properties:
                applied_main:
                  type: string
                  pattern: "^[0-9a-f]{40}$"
      responses:
        "200":
          description: Applied main acknowledged.
          content:
            application/json:
              schema:
                type: object
                required: [status, applied_main, applied_event_seq]
                properties:
                  status:
                    const: ok
                  applied_main:
                    type: string
                    pattern: "^[0-9a-f]{40}$"
                  applied_event_seq:
                    type: integer
                    minimum: 0
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/onboarding/complete:
    post:
      summary: Mark the registered device onboarding workflow complete after applying server main.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [applied_main]
              properties:
                applied_main:
                  type: string
                  pattern: "^[0-9a-f]{40}$"
      responses:
        "200":
          description: Onboarding completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/sync/unpair:
    post:
      summary: Revoke the current paired device and invalidate its device token.
      security:
        - deviceBearer: []
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Device unpaired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/conflicts:
    get:
      summary: List durable conflict records for an owned vault.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: status
          in: query
          schema:
            type: string
            enum: [open, resolved, all]
      responses:
        "200":
          description: Conflict records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictListResponse"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/conflicts/{conflict_id}:
    get:
      summary: Return a conflict review package with path metadata plus source and rendered Markdown diffs.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/ConflictId"
      responses:
        "200":
          description: Conflict review package.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictReviewPackage"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/conflicts/{conflict_id}/refresh:
    post:
      summary: Refresh a stale conflict review package against the current server main.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/ConflictId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Refreshed conflict review package.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictReviewPackage"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/conflicts/{conflict_id}/resolve:
    post:
      summary: Resolve a conflict with the current authenticated dashboard session.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/ConflictId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveConflictRequest"
      responses:
        "200":
          description: Resolution merge commit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveConflictResponse"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/history/query:
    post:
      summary: List canonical first-parent Git-backed note history for an owned vault path.
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteHistoryQueryRequest"
      responses:
        "200":
          description: Note history versions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteHistoryQueryResponse"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/history/version:
    post:
      summary: Return source content and diff for one historical note version.
      parameters:
        - $ref: "#/components/parameters/VaultId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteHistoryVersionRequest"
      responses:
        "200":
          description: Historical note version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteHistoryVersionResponse"
        "403":
          description: Recent authentication or CSRF verification failed for an explicit plugin-content request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/history/restore:
    post:
      summary: Restore a historical note version after recent dashboard authentication.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteRestoreRequest"
      responses:
        "200":
          description: Restore commit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteRestoreResponse"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/diagnostics/export:
    get:
      summary: Export owner-scoped diagnostics with content, paths, secrets, and operation manifests redacted.
      parameters:
        - $ref: "#/components/parameters/VaultId"
      responses:
        "200":
          description: Redacted diagnostics export.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsExport"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/maintenance/git-gc/start:
    post:
      summary: Run owner-confirmed Git verification and garbage collection.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - $ref: "#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Maintenance completion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceStartResponse"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /vaults/{vault_id}/events:
    get:
      summary: Poll redacted vault-scoped events after a cursor.
      parameters:
        - $ref: "#/components/parameters/VaultId"
        - name: after
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Event page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPage"
        "410":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    dashboardSession:
      type: apiKey
      in: cookie
      name: obts_session
      description: Default HTTP/dev dashboard session cookie.
    dashboardSessionHttps:
      type: apiKey
      in: cookie
      name: __Host-obts_session
      description: Secure dashboard session cookie used when the public base URL is HTTPS.
    deviceBearer:
      type: http
      scheme: bearer
    connectionBearer:
      type: http
      scheme: bearer
      description: Short-lived connection secret held only by the onboarding plugin.
  parameters:
    ConnectionId:
      name: connection_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^con_"
    VaultId:
      name: vault_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^vlt_"
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^usr_"
    DeviceId:
      name: device_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^dev_"
    TransferId:
      name: transfer_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^trn_"
    ConflictId:
      name: conflict_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^conf_"
    CsrfHeader:
      name: X-OBTS-CSRF
      in: header
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Redacted JSON error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    DisplayName:
      type: string
      minLength: 1
      maxLength: 80
      description: NFC-normalized, trimmed display name without control characters.
    SetupRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 12
        display_name:
          type: string
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      required: [user_id, csrf_token, recent_auth_expires_at]
      properties:
        user_id:
          type: string
        csrf_token:
          type: string
        recent_auth_expires_at:
          type: string
          format: date-time
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    PasswordResetRequest:
      type: object
      required: [reset_token, new_password]
      properties:
        reset_token:
          type: string
        new_password:
          type: string
          minLength: 12
    AdminCreateUserRequest:
      allOf:
        - $ref: "#/components/schemas/SetupRequest"
        - type: object
          properties:
            is_admin:
              type: boolean
    AdminUserListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserSummary"
    AdminUserSummary:
      type: object
      required:
        - user_id
        - username
        - display_name
        - is_admin
        - disabled
        - created_at
        - last_login_at
        - owned_vault_count
      properties:
        user_id:
          type: string
          pattern: "^usr_"
        username:
          type: string
        display_name:
          type: string
        is_admin:
          type: boolean
        disabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_login_at:
          oneOf:
            - type: "null"
            - type: string
              format: date-time
        owned_vault_count:
          type: integer
          minimum: 0
    PasswordResetTokenResponse:
      type: object
      required: [reset_token, expires_at]
      properties:
        reset_token:
          type: string
        expires_at:
          type: string
          format: date-time
    VaultSummary:
      type: object
      required: [vault_id, owner_user_id, display_name, current_main, status, created_at, updated_at]
      properties:
        vault_id:
          type: string
        owner_user_id:
          type: string
        display_name:
          $ref: "#/components/schemas/DisplayName"
        current_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        status:
          type: string
          enum: [active, blocked_integrity]
        root_commit:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    VaultNameRequest:
      type: object
      required: [display_name]
      properties:
        display_name:
          $ref: "#/components/schemas/DisplayName"
    CreateVaultRequest:
      $ref: "#/components/schemas/VaultNameRequest"
    DeviceNameRequest:
      type: object
      required: [device_name]
      properties:
        device_name:
          $ref: "#/components/schemas/DisplayName"
    DeviceNameResponse:
      type: object
      required: [device_id, device_name]
      properties:
        device_id:
          type: string
        device_name:
          $ref: "#/components/schemas/DisplayName"
    ConnectionLocalSummary:
      type: object
      required: [has_content, syncable_file_count, syncable_bytes, has_detached_baseline]
      properties:
        has_content:
          type: boolean
        syncable_file_count:
          type: integer
          minimum: 0
        syncable_bytes:
          type: integer
          minimum: 0
        has_detached_baseline:
          type: boolean
    CreateConnectionRequest:
      type: object
      required: [plugin_version, device_name, local_vault_name, local_summary]
      properties:
        plugin_version:
          type: string
        device_name:
          $ref: "#/components/schemas/DisplayName"
        local_vault_name:
          type: string
        local_summary:
          $ref: "#/components/schemas/ConnectionLocalSummary"
    CreateConnectionResponse:
      type: object
      required: [connection_id, connection_secret, authorization_url, verification_code, credential_salt, expires_at, poll_interval_ms]
      properties:
        connection_id:
          type: string
        connection_secret:
          type: string
        authorization_url:
          type: string
          format: uri
        verification_code:
          type: string
        credential_salt:
          type: string
        expires_at:
          type: string
          format: date-time
        poll_interval_ms:
          type: integer
    ConnectionStatusResponse:
      oneOf:
        - type: object
          required: [status, expires_at]
          properties:
            status:
              const: pending
            expires_at:
              type: string
              format: date-time
        - type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [denied, expired]
        - type: object
          required: [status, selection, vault_id, vault_name, expected_main]
          properties:
            status:
              const: approved
            selection:
              type: string
              enum: [new_vault, existing_vault]
            vault_id:
              oneOf:
                - type: "null"
                - type: string
            vault_name:
              type: string
            expected_main:
              oneOf:
                - type: "null"
                - type: string
                  pattern: "^[0-9a-f]{40}$"
        - type: object
          required: [status, vault_id, vault_name, device_id]
          properties:
            status:
              const: consumed
            vault_id:
              type: string
            vault_name:
              type: string
            device_id:
              type: string
    ConnectionReviewResponse:
      type: object
      required: [connection_id, verification_code, status, plugin_version, device_name, local_vault_name, local_summary, vaults]
      properties:
        connection_id:
          type: string
        verification_code:
          type: string
        status:
          type: string
          enum: [pending, approved, denied, consumed, expired]
        plugin_version:
          type: string
        device_name:
          $ref: "#/components/schemas/DisplayName"
        local_vault_name:
          type: string
        local_summary:
          $ref: "#/components/schemas/ConnectionLocalSummary"
        vaults:
          type: array
          items:
            type: object
            required: [vault_id, display_name, current_main, status]
            properties:
              vault_id:
                type: string
              display_name:
                type: string
              current_main:
                type: string
                pattern: "^[0-9a-f]{40}$"
              status:
                type: string
                enum: [active, blocked_integrity]
    ConnectionBootstrapManifest:
      type: object
      required: [api_version, connection_id, vault_id, vault_name, root_commit, target_main, changed_paths, explicit_directories]
      properties:
        api_version:
          const: 2026-07-12.browser-onboarding
        connection_id:
          type: string
        vault_id:
          type: string
        vault_name:
          type: string
        root_commit:
          type: string
          pattern: "^[0-9a-f]{40}$"
        target_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        changed_paths:
          type: array
          items:
            type: string
        explicit_directories:
          type: array
          items:
            type: string
    ApproveConnectionRequest:
      type: object
      required: [selection]
      properties:
        selection:
          type: string
          enum: [new_vault, existing_vault]
        vault_id:
          type: string
        display_name:
          $ref: "#/components/schemas/DisplayName"
    CompleteConnectionRequest:
      type: object
      required: [mode, expected_main]
      properties:
        mode:
          type: string
          enum: [initialize, use_server, merge]
        expected_main:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
        proposal_kind:
          type: string
          enum: [new_vault_import, independent_vault_merge, shared_baseline_merge]
        proposal_base:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
    CompleteConnectionResponse:
      type: object
      required: [user_id, vault_id, vault_name, root_commit, current_main, device_id, device_token, device_ref, mode]
      properties:
        user_id:
          type: string
        vault_id:
          type: string
        vault_name:
          type: string
        root_commit:
          type: string
          pattern: "^[0-9a-f]{40}$"
        current_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        device_id:
          type: string
        device_token:
          type: string
        device_ref:
          type: string
        mode:
          type: string
          enum: [initialize, use_server, merge]
    DeviceSelfResponse:
      type: object
      required:
        - user_id
        - vault_id
        - device_id
        - device_name
        - device_ref
        - server_device_ref
        - current_main
        - vault_status
        - status
        - last_applied_main
        - last_applied_event_seq
        - event_seq
      properties:
        user_id:
          type: string
        vault_id:
          type: string
        device_id:
          type: string
        device_name:
          $ref: "#/components/schemas/DisplayName"
        device_ref:
          type: string
        server_device_ref:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
        current_main:
          type: string
          pattern: "^[0-9a-f]{40}$"
        vault_status:
          type: string
          enum: [active, blocked_integrity]
        status:
          type: string
          enum: [paired, synced, ahead, review_needed, blocked_recovery, revoked]
        last_applied_main:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
        last_applied_event_seq:
          type: integer
          minimum: 0
        event_seq:
          type: integer
          minimum: 0
    DiagnosticBreadcrumb:
      type: object
      additionalProperties: false
      required: [point, outcome, value_kind, size_bucket, error_code]
      properties:
        point:
          type: string
          enum: [onboarding_approved, bootstrap_response, multipart_pack, pack_persist_write, pack_persist_read, index_fs_stat, index_fs_read_file, index_fs_read, index_fs_write, index_pack, sync_request, apply, upload_prepare, recovery, startup_metadata, startup_git, startup_state, recovery_journal, recovery_target_commit, recovery_target_tree, recovery_file_validation, recovery_bundle, recovery_file_apply, recovery_refs, recovery_state]
        outcome:
          type: string
          enum: [started, returned, succeeded, failed]
        value_kind:
          type: string
          enum: [buffer, uint8array, arraybuffer, string, "null", other, unknown]
        size_bucket:
          type: string
          enum: [empty, under_64k, under_1m, under_16m, under_64m, over_64m, unknown]
        error_code:
          type: string
          enum: [none, enoent, eexist, eisdir, enotdir, enotempty, eacces, eperm, eio, invalid_type, unknown]
    DiagnosticEventFields:
      type: object
      required: [schema_version, event_id, plugin_version, obsidian_version, platform_family, flow, stage, failure_code, error_class, retryable, breadcrumbs]
      properties:
        schema_version:
          const: 1
        event_id:
          type: string
          pattern: "^dgr_[0-9a-f]{32}$"
        plugin_version:
          type: string
          maxLength: 80
        obsidian_version:
          type: string
          maxLength: 80
        platform_family:
          type: string
          enum: [ios, android, desktop, unknown]
        flow:
          type: string
          enum: [onboarding, sync, apply, recovery, rebuild, plugin]
        stage:
          type: string
          enum: [browser_handoff, approval_poll, bootstrap_request, multipart_parse, pack_persist, pack_index, tree_read, sync_request, apply, recovery, plugin_lifecycle, unknown]
        failure_code:
          type: string
          enum: [invalid_json, missing_buffer_dependency, operation_interrupted_by_reload, sync_lease_blocked, null_pack_slice, pack_index_failed, adapter_read_failed, adapter_write_failed, adapter_stat_failed, multipart_parse_failed, request_failed, onboarding_failed, sync_failed, directory_recovery_decision_required, directory_recovery_changed, directory_recovery_journal_invalid, recovery_failed, operation_stalled, unknown]
        error_class:
          type: string
          enum: [type_error, transport_error, blocked_error, error, unknown]
        retryable:
          type: boolean
        breadcrumbs:
          type: array
          maxItems: 16
          items:
            $ref: "#/components/schemas/DiagnosticBreadcrumb"
    DiagnosticEvent:
      allOf:
        - $ref: "#/components/schemas/DiagnosticEventFields"
      unevaluatedProperties: false
    DiagnosticIngestResponse:
      type: object
      additionalProperties: false
      required: [status, event_id]
      properties:
        status:
          type: string
          enum: [accepted, duplicate]
        event_id:
          type: string
          pattern: "^dgr_[0-9a-f]{32}$"
    DiagnosticEventView:
      allOf:
        - $ref: "#/components/schemas/DiagnosticEventFields"
        - type: object
          required: [received_at]
          properties:
            received_at:
              type: string
              format: date-time
      unevaluatedProperties: false
    DiagnosticEventsResponse:
      type: object
      additionalProperties: false
      required: [ingestion_enabled, retention_days, events, next_cursor]
      properties:
        ingestion_enabled:
          type: boolean
        retention_days:
          type: integer
          minimum: 1
          maximum: 90
        events:
