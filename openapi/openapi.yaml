          type: string
        vault_id:
          type: string
        device_id:
          type: string
        expected_device_ref:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
        target_commit:
          type: string
          pattern: "^[0-9a-f]{40}$"
        client_known_main:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
        base_commit:
          oneOf:
            - type: "null"
            - type: string
              pattern: "^[0-9a-f]{40}$"
