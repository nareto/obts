              type: array
              items:
                type: string
            affected_roots:
              type: array
              items:
                type: string
            expected_event_seq:
              type: integer
              minimum: 0
        validator_results:
          type: object
        validator_summary:
          type: object
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
    ReadinessSummary:
